<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e8eaf6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 25px 35px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #5c6bc0;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #3f51b5;
        }

        p {
            text-align: center;
        }

        a {
            text-decoration: none;
            color: #5c6bc0;
        }

        .flash {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .flash.success {
            background-color: #d4edda;
            color: #155724;
        }

        .flash.error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>
    <div class="register-container">
        <h2>Register</h2>
        <form id="registerForm" action="{{url_for('register')}}" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" id="password" placeholder="Password" required>
            <button type="submit">SIGN UP</button>
            <p class="error" id="errorMsg"></p>
        </form>
        <p>ZATEN BİR HESABIN VAR MI <a href="{{url_for('login')}}">Login</a></p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <script>
            const form = document.getElementById("registerForm");
            const passwordInput = document.getElementById("password");
            const errorMsg = document.getElementById("errorMsg");

            form.addEventListener("submit", function (e) {
                const password = passwordInput.value;
                const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[A-Za-z\d@$!%*?&]{8,}$/;

                if (!regex.test(password)) {
                    e.preventDefault(); //şifre kurallara uymuyorsa forma gönderme
                    errorMsg.textContent = "Şifre en az 8 karakter olmalı, büyük/küçük harf ve sayı  içermelidir.";

                } else {
                    errorMsg.textContent = ""; //bi sorun yoksa hata temizleniyor
                }


            });
        </script>
    </div>
</body>

</html>
